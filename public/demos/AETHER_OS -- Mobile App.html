<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>AETHER_OS // Mobile App</title>
    <style>
        :root {
            --bg: #000000;
            --surface: #121214;
            --text: #ffffff;
            --accent: #30d158; /* iOS Green */
            --nav-h: 75px;
            --safe-b: env(safe-area-inset-bottom);
            --ease: cubic-bezier(0.4, 0, 0.2, 1);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background: var(--bg);
            color: var(--text);
            height: 100vh;
            width: 100vw;
            overflow: hidden;
            position: fixed; /* Prevents unwanted bounce on iOS */
        }

        /* --- App Structure --- */
        #app-shell {
            display: flex;
            height: 100%;
            width: 300vw; /* 3 Pages */
            overflow-x: auto;
            scroll-snap-type: x mandatory;
            scroll-behavior: smooth;
            scrollbar-width: none;
        }
        #app-shell::-webkit-scrollbar { display: none; }

        .page {
            width: 100vw;
            height: 100%;
            scroll-snap-align: start;
            padding: 20px;
            padding-top: 60px;
            padding-bottom: calc(var(--nav-h) + var(--safe-b));
            overflow-y: auto;
            position: relative;
        }

        /* --- Global Components --- */
        header {
            position: fixed;
            top: 0; width: 100%;
            height: 60px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 20px;
            background: rgba(0,0,0,0.8);
            backdrop-filter: blur(20px);
            z-index: 100;
        }

        .card {
            background: var(--surface);
            border-radius: 20px;
            padding: 20px;
            margin-bottom: 16px;
            border: 1px solid rgba(255,255,255,0.05);
            transition: transform 0.1s;
        }

        .card:active {
            transform: scale(0.97); /* Haptic-style visual feedback */
        }

        /* --- Bottom Navigation --- */
        nav {
            position: fixed;
            bottom: 0;
            width: 100%;
            height: calc(var(--nav-h) + var(--safe-b));
            background: rgba(18, 18, 20, 0.95);
            backdrop-filter: blur(20px);
            display: flex;
            justify-content: space-around;
            padding-bottom: var(--safe-b);
            border-top: 1px solid rgba(255,255,255,0.1);
            z-index: 1000;
        }

        .nav-btn {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            color: var(--text);
            opacity: 0.4;
            font-size: 10px;
            font-weight: 600;
            text-decoration: none;
            transition: 0.3s var(--ease);
            width: 25%;
        }

        .nav-btn.active { opacity: 1; color: var(--accent); }
        .nav-btn i { font-size: 24px; margin-bottom: 4px; font-style: normal; }

        /* --- Floating Action Button --- */
        .fab {
            position: fixed;
            bottom: calc(var(--nav-h) + var(--safe-b) + 20px);
            right: 20px;
            width: 56px;
            height: 56px;
            background: var(--accent);
            border-radius: 28px;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 8px 24px rgba(48, 209, 88, 0.3);
            z-index: 500;
            border: none;
            color: black;
            font-size: 24px;
            font-weight: bold;
            transition: transform 0.2s;
        }

        .fab:active { transform: scale(0.85) rotate(90deg); }

        /* --- Desktop Optimization --- */
        @media (min-width: 1024px) {
            body { background: #1a1a1c; display: flex; align-items: center; justify-content: center; }
            #app-shell {
                width: 390px; /* Standard Mobile Width */
                height: 844px; /* Standard Mobile Height */
                border-radius: 40px;
                border: 8px solid #333;
                box-shadow: 0 50px 100px rgba(0,0,0,0.5);
                position: relative;
            }
            header, nav { width: 374px; position: absolute; border-radius: 0 0 32px 32px; }
            header { border-radius: 32px 32px 0 0; }
            nav { border-radius: 0 0 32px 32px; bottom: 0; left: 0; }
        }

        /* --- Animations --- */
        .fade-in { animation: fadeIn 0.5s var(--ease) forwards; opacity: 0; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>

    <header>
        <span style="font-weight: 700; letter-spacing: -0.5px;">AETHER</span>
        <div style="width: 32px; height: 32px; background: #333; border-radius: 50%;"></div>
    </header>

    <button class="fab">+</button>

    <div id="app-shell">
        <section class="page" id="page-1">
            <h2 style="font-size: 28px; margin-bottom: 20px;">For You</h2>
            <div class="card fade-in" style="animation-delay: 0.1s;">
                <p style="opacity: 0.5; font-size: 12px; text-transform: uppercase;">Energy Usage</p>
                <h3 style="font-size: 24px; margin: 8px 0;">24.5 kWh</h3>
                <div style="width: 100%; height: 4px; background: #333; border-radius: 2px;">
                    <div style="width: 65%; height: 100%; background: var(--accent); border-radius: 2px;"></div>
                </div>
            </div>
            <div class="card fade-in" style="animation-delay: 0.2s;">
                <h3>Active Nodes</h3>
                <p style="opacity: 0.5;">08 Devices currently syncing</p>
            </div>
        </section>

        <section class="page" id="page-2">
            <h2 style="font-size: 28px; margin-bottom: 20px;">Activity</h2>
            <div class="card">
                <p>Morning Workflow</p>
                <span style="color: var(--accent);">Completed</span>
            </div>
            <div class="card">
                <p>System Update</p>
                <span style="opacity: 0.5;">Pending...</span>
            </div>
        </section>

        <section class="page" id="page-3">
            <h2 style="font-size: 28px; margin-bottom: 20px;">Profile</h2>
            <div class="card" style="display: flex; align-items: center; gap: 15px;">
                <div style="width: 50px; height: 50px; background: var(--accent); border-radius: 50%;"></div>
                <div>
                    <h4>Admin User</h4>
                    <p style="opacity: 0.5; font-size: 12px;">Premium Member</p>
                </div>
            </div>
            <div class="card" onclick="toggleTheme()">Dark Mode: On</div>
        </section>
    </div>

    <nav id="bottom-nav">
        <a href="javascript:void(0)" class="nav-btn active" onclick="navigate(0)"><i>ðŸ </i>Home</a>
        <a href="javascript:void(0)" class="nav-btn" onclick="navigate(1)"><i>ðŸ“ˆ</i>Stats</a>
        <a href="javascript:void(0)" class="nav-btn" onclick="navigate(2)"><i>âš™ï¸</i>Settings</a>
    </nav>

    <script>
        const shell = document.getElementById('app-shell');
        const navBtns = document.querySelectorAll('.nav-btn');

        // --- Navigation Logic ---
        function navigate(index) {
            const width = shell.offsetWidth;
            shell.scrollTo({
                left: width * index,
                behavior: 'smooth'
            });
            updateNav(index);
        }

        function updateNav(index) {
            navBtns.forEach((btn, i) => {
                btn.classList.toggle('active', i === index);
            });
            // Haptic feedback simulation
            if ('vibrate' in navigator) navigator.vibrate(10);
        }

        // Sync Nav with Scroll (Gestures)
        shell.addEventListener('scroll', () => {
            const index = Math.round(shell.scrollLeft / shell.offsetWidth);
            updateNav(index);
        });

        // --- Offline Readiness ---
        // Basic check to see if we are in a browser environment
        window.addEventListener('load', () => {
            console.log("App loaded. Functional offline.");
        });

        // --- Haptic/Visual Feedback ---
        document.querySelectorAll('.card, .nav-btn, .fab').forEach(el => {
            el.addEventListener('touchstart', () => {
                // Subtle scale or highlight logic is handled in CSS :active
            });
        });

        // Adaptive Page Resizing for Desktop
        window.addEventListener('resize', () => {
            const index = Math.round(shell.scrollLeft / shell.offsetWidth);
            navigate(index);
        });
    </script>
<script src="../template-injector.js"></script>
</body>
</html>
