<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LUMINA // Essential Objects</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #fdfdfd;
            --text: #1a1a1a;
            --accent: #000000;
            --muted: #71717a;
            --card-bg: #ffffff;
            --shadow: 0 10px 30px -10px rgba(0,0,0,0.08);
            --transition: cubic-bezier(0.4, 0, 0.2, 1);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background-color: var(--bg);
            color: var(--text);
            font-family: 'Plus Jakarta Sans', sans-serif;
            overflow-x: hidden;
            scroll-behavior: smooth;
        }

        /* --- Navigation & Cart Header --- */
        nav {
            position: sticky;
            top: 0;
            background: rgba(253, 253, 253, 0.8);
            backdrop-filter: blur(10px);
            z-index: 1000;
            display: flex;
            justify-content: space-between;
            padding: 1.5rem 5%;
            align-items: center;
            border-bottom: 1px solid #f1f1f1;
        }

        .logo { font-weight: 700; font-size: 1.2rem; letter-spacing: -0.5px; }

        .cart-icon {
            position: relative;
            cursor: pointer;
            padding: 8px;
        }

        .cart-badge {
            position: absolute;
            top: 0; right: 0;
            background: var(--accent);
            color: white;
            font-size: 0.7rem;
            width: 18px; height: 18px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            transform: scale(0);
            transition: transform 0.3s var(--transition);
        }

        .cart-badge.active { transform: scale(1); }

        /* --- Product Grid --- */
        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 4rem 5%;
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 2.5rem;
        }

        .product-card {
            background: var(--card-bg);
            border-radius: 20px;
            overflow: hidden;
            transition: transform 0.4s var(--transition), box-shadow 0.4s var(--transition);
            position: relative;
        }

        .product-card:hover {
            transform: translateY(-8px);
            box-shadow: var(--shadow);
        }

        .image-wrapper {
            width: 100%;
            aspect-ratio: 1;
            background: #f5f5f5;
            overflow: hidden;
            position: relative;
        }

        .product-img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: transform 0.6s var(--transition);
        }

        .product-card:hover .product-img {
            transform: scale(1.1);
        }

        .product-info {
            padding: 1.5rem;
        }

        .product-category {
            font-size: 0.75rem;
            color: var(--muted);
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 0.5rem;
        }

        .product-name {
            font-weight: 600;
            font-size: 1.1rem;
            margin-bottom: 0.25rem;
        }

        .product-price {
            font-weight: 400;
            color: var(--text);
        }

        /* --- Add to Cart Button --- */
        .add-btn {
            width: 100%;
            padding: 1rem;
            margin-top: 1rem;
            background: var(--accent);
            color: white;
            border: none;
            border-radius: 12px;
            font-weight: 600;
            cursor: pointer;
            transition: 0.3s;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 10px;
            overflow: hidden;
        }

        .add-btn:active { transform: scale(0.96); }

        .add-btn.success {
            background: #10b981;
        }

        /* --- Floating Cart Preview --- */
        .cart-preview {
            position: fixed;
            bottom: 30px;
            right: 30px;
            width: 320px;
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.15);
            padding: 1.5rem;
            transform: translateY(150%);
            transition: transform 0.5s var(--transition);
            z-index: 1001;
        }

        .cart-preview.open { transform: translateY(0); }

        .cart-item {
            display: flex;
            gap: 15px;
            margin-bottom: 15px;
            animation: slideIn 0.3s ease-out forwards;
        }

        @keyframes slideIn {
            from { opacity: 0; transform: translateX(20px); }
            to { opacity: 1; transform: translateX(0); }
        }

        .item-thumb {
            width: 50px; height: 50px;
            border-radius: 8px;
            background: #eee;
            object-fit: cover;
        }
    </style>
</head>
<body>

    <nav>
        <div class="logo">LUMINA</div>
        <div class="cart-icon" onclick="toggleCart()">
            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="9" cy="21" r="1"></circle><circle cx="20" cy="21" r="1"></circle><path d="M1 1h4l2.68 13.39a2 2 0 0 0 2 1.61h9.72a2 2 0 0 0 2-1.61L23 6H6"></path></svg>
            <div class="cart-badge" id="cart-badge">0</div>
        </div>
    </nav>

    <div class="container">
        <header style="margin-bottom: 3rem;">
            <h1 style="font-size: 2.5rem; letter-spacing: -1px;">Summer Collection</h1>
            <p style="color: var(--muted);">Minimalist essentials designed for modern living.</p>
        </header>

        <div class="grid" id="product-grid">
            <div class="product-card">
                <div class="image-wrapper">
                    <div style="width:100%; height:100%; background: linear-gradient(45deg, #eee, #f9f9f9);"></div>
                </div>
                <div class="product-info">
                    <p class="product-category">Home</p>
                    <p class="product-name">Ceramic Vase</p>
                    <p class="product-price">$45.00</p>
                    <button class="add-btn" onclick="addToCart(this, 'Ceramic Vase', 45)">Add to Cart</button>
                </div>
            </div>

            <div class="product-card">
                <div class="image-wrapper">
                    <div style="width:100%; height:100%; background: linear-gradient(45deg, #e2e2e2, #f1f1f1);"></div>
                </div>
                <div class="product-info">
                    <p class="product-category">Tech</p>
                    <p class="product-name">Wireless Charge Pad</p>
                    <p class="product-price">$89.00</p>
                    <button class="add-btn" onclick="addToCart(this, 'Charge Pad', 89)">Add to Cart</button>
                </div>
            </div>

            <div class="product-card">
                <div class="image-wrapper">
                    <div style="width:100%; height:100%; background: linear-gradient(45deg, #ddd, #eee);"></div>
                </div>
                <div class="product-info">
                    <p class="product-category">Wellness</p>
                    <p class="product-name">Sandalwood Candle</p>
                    <p class="product-price">$32.00</p>
                    <button class="add-btn" onclick="addToCart(this, 'Sandalwood', 32)">Add to Cart</button>
                </div>
            </div>
        </div>
    </div>

    <div class="cart-preview" id="cart-preview">
        <div style="display:flex; justify-content:space-between; margin-bottom: 1rem;">
            <h4 style="font-weight: 700;">Your Cart</h4>
            <span style="cursor:pointer; font-size: 0.8rem;" onclick="toggleCart()">Close</span>
        </div>
        <div id="cart-items-list">
            </div>
        <hr style="border:0; border-top:1px solid #eee; margin: 15px 0;">
        <button class="add-btn" style="background:#000;">Checkout Now</button>
    </div>

    <script>
        let cart = [];
        const badge = document.getElementById('cart-badge');
        const preview = document.getElementById('cart-preview');
        const list = document.getElementById('cart-items-list');

        function addToCart(btn, name, price) {
            // Animation for Button
            const originalText = btn.innerText;
            btn.classList.add('success');
            btn.innerText = 'Added âœ“';
            
            // Cart Logic
            cart.push({ name, price });
            updateCartUI();

            // Reset button
            setTimeout(() => {
                btn.classList.remove('success');
                btn.innerText = originalText;
            }, 1500);

            // Pop badge
            badge.classList.add('active');
            badge.innerText = cart.length;
            
            // Auto-open preview briefly
            preview.classList.add('open');
            setTimeout(() => {
                if(!isCartManuallyOpen) preview.classList.remove('open');
            }, 3000);
        }

        let isCartManuallyOpen = false;
        function toggleCart() {
            isCartManuallyOpen = !isCartManuallyOpen;
            preview.classList.toggle('open');
        }

        function updateCartUI() {
            list.innerHTML = '';
            // Only show last 3 items for preview
            cart.slice(-3).forEach(item => {
                const div = document.createElement('div');
                div.className = 'cart-item';
                div.innerHTML = `
                    <div class="item-thumb"></div>
                    <div>
                        <p style="font-size:0.9rem; font-weight:600;">${item.name}</p>
                        <p style="font-size:0.8rem; color:var(--muted);">$${item.price}</p>
                    </div>
                `;
                list.appendChild(div);
            });
        }

        // --- Intersection Observer for Scroll Animations ---
        const observer = new IntersectionObserver((entries) => {
            entries.forEach(entry => {
                if (entry.isIntersecting) {
                    entry.target.animate([
                        { opacity: 0, transform: 'translateY(30px)' },
                        { opacity: 1, transform: 'translateY(0)' }
                    ], {
                        duration: 800,
                        easing: 'cubic-bezier(0.4, 0, 0.2, 1)',
                        fill: 'forwards'
                    });
                    observer.unobserve(entry.target);
                }
            });
        }, { threshold: 0.1 });

        document.querySelectorAll('.product-card').forEach(card => observer.observe(card));
    </script>
<script src="../template-injector.js"></script>
</body>
</html>
