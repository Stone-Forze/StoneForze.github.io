<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Digital Archaeology Terminal v1.0</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Courier New', monospace;
            background: #0a0a0a;
            color: #00FF00;
            overflow: hidden;
            height: 100vh;
            position: relative;
        }

        /* CRT Screen Effect */
        .crt {
            position: relative;
            width: 100%;
            height: 100vh;
            background: #0a0a0a;
            overflow: hidden;
        }

        /* Scanlines overlay */
        .crt::before {
            content: "";
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: repeating-linear-gradient(
                0deg,
                rgba(0, 0, 0, 0.15),
                rgba(0, 0, 0, 0.15) 1px,
                transparent 1px,
                transparent 2px
            );
            pointer-events: none;
            z-index: 1000;
            animation: scanlines 8s linear infinite;
        }

        /* Flicker animation */
        .crt::after {
            content: "";
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(18, 16, 16, 0.1);
            opacity: 0;
            pointer-events: none;
            z-index: 999;
            animation: flicker 0.15s infinite;
        }

        @keyframes scanlines {
            0% {
                transform: translateY(0);
            }
            100% {
                transform: translateY(10px);
            }
        }

        @keyframes flicker {
            0% {
                opacity: 0.27861;
            }
            5% {
                opacity: 0.34769;
            }
            10% {
                opacity: 0.23604;
            }
            15% {
                opacity: 0.90626;
            }
            20% {
                opacity: 0.18128;
            }
            25% {
                opacity: 0.83891;
            }
            30% {
                opacity: 0.65583;
            }
            35% {
                opacity: 0.67807;
            }
            40% {
                opacity: 0.26559;
            }
            45% {
                opacity: 0.84693;
            }
            50% {
                opacity: 0.96019;
            }
            55% {
                opacity: 0.08594;
            }
            60% {
                opacity: 0.20313;
            }
            65% {
                opacity: 0.71988;
            }
            70% {
                opacity: 0.53455;
            }
            75% {
                opacity: 0.37288;
            }
            80% {
                opacity: 0.71428;
            }
            85% {
                opacity: 0.70419;
            }
            90% {
                opacity: 0.7003;
            }
            95% {
                opacity: 0.36108;
            }
            100% {
                opacity: 0.24387;
            }
        }

        /* Green glow effect */
        .glow {
            text-shadow: 
                0 0 5px #00FF00,
                0 0 10px #00FF00,
                0 0 15px #00FF00,
                0 0 20px #00FF00;
        }

        /* Container */
        .container {
            position: relative;
            z-index: 1;
            padding: 20px;
            max-width: 1200px;
            margin: 0 auto;
            height: 100vh;
            display: flex;
            flex-direction: column;
        }

        /* Header */
        .header {
            text-align: center;
            margin-bottom: 20px;
            border: 2px solid #00FF00;
            padding: 15px;
            background: rgba(0, 255, 0, 0.05);
        }

        .header h1 {
            font-size: 28px;
            margin-bottom: 5px;
        }

        .header p {
            font-size: 12px;
            opacity: 0.8;
        }

        /* Main content area */
        .main-content {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            flex: 1;
            overflow: hidden;
        }

        /* Excavator panel */
        .excavator-panel {
            border: 2px solid #00FF00;
            padding: 15px;
            background: rgba(0, 255, 0, 0.02);
            display: flex;
            flex-direction: column;
        }

        .excavator-panel h2 {
            font-size: 18px;
            margin-bottom: 15px;
            border-bottom: 1px solid #00FF00;
            padding-bottom: 5px;
        }

        /* Dig button */
        .dig-button {
            background: transparent;
            border: 2px solid #00FF00;
            color: #00FF00;
            font-family: 'Courier New', monospace;
            font-size: 16px;
            padding: 15px 30px;
            cursor: pointer;
            transition: all 0.3s;
            margin-bottom: 20px;
        }

        .dig-button:hover {
            background: rgba(0, 255, 0, 0.2);
            box-shadow: 0 0 20px #00FF00;
        }

        .dig-button:active {
            transform: scale(0.98);
        }

        .dig-button:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        /* Loading bar */
        .loading-container {
            margin-bottom: 20px;
            display: none;
        }

        .loading-container.active {
            display: block;
        }

        .loading-bar {
            width: 100%;
            height: 30px;
            border: 2px solid #00FF00;
            position: relative;
            overflow: hidden;
            background: rgba(0, 255, 0, 0.05);
        }

        .loading-fill {
            height: 100%;
            background: #00FF00;
            width: 0%;
            transition: width 0.1s linear;
            box-shadow: 0 0 10px #00FF00;
        }

        .loading-text {
            margin-top: 10px;
            font-size: 12px;
            text-align: center;
        }

        /* Artifact display */
        .artifact-display {
            flex: 1;
            overflow-y: auto;
            border: 1px solid #00FF00;
            padding: 10px;
            background: rgba(0, 255, 0, 0.02);
        }

        .artifact {
            border: 1px solid #00FF00;
            padding: 15px;
            margin-bottom: 15px;
            background: rgba(0, 255, 0, 0.05);
            animation: fadeIn 0.5s;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(-10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .artifact-header {
            font-size: 14px;
            margin-bottom: 10px;
            font-weight: bold;
        }

        .artifact-content {
            font-size: 12px;
            line-height: 1.5;
        }

        .artifact-image {
            border: 1px solid #00FF00;
            padding: 10px;
            margin: 10px 0;
            text-align: center;
            background: rgba(0, 255, 0, 0.03);
        }

        /* Log panel */
        .log-panel {
            border: 2px solid #00FF00;
            padding: 15px;
            background: rgba(0, 255, 0, 0.02);
            display: flex;
            flex-direction: column;
        }

        .log-panel h2 {
            font-size: 18px;
            margin-bottom: 15px;
            border-bottom: 1px solid #00FF00;
            padding-bottom: 5px;
        }

        .log-display {
            flex: 1;
            overflow-y: auto;
            font-size: 11px;
            line-height: 1.4;
            border: 1px solid #00FF00;
            padding: 10px;
            background: rgba(0, 0, 0, 0.5);
        }

        .log-entry {
            margin-bottom: 3px;
            opacity: 0;
            animation: typeIn 0.1s forwards;
        }

        @keyframes typeIn {
            to {
                opacity: 1;
            }
        }

        .log-entry.system {
            color: #00FF00;
        }

        .log-entry.warning {
            color: #FFFF00;
        }

        .log-entry.error {
            color: #FF0000;
        }

        /* Scrollbar styling */
        ::-webkit-scrollbar {
            width: 10px;
        }

        ::-webkit-scrollbar-track {
            background: rgba(0, 255, 0, 0.1);
        }

        ::-webkit-scrollbar-thumb {
            background: #00FF00;
            box-shadow: 0 0 5px #00FF00;
        }

        /* Cursor blink */
        .cursor {
            animation: blink 1s infinite;
        }

        @keyframes blink {
            0%, 49% {
                opacity: 1;
            }
            50%, 100% {
                opacity: 0;
            }
        }

        /* Stats display */
        .stats {
            margin-top: 10px;
            padding: 10px;
            border: 1px solid #00FF00;
            background: rgba(0, 255, 0, 0.05);
            font-size: 12px;
        }

        .stat-line {
            margin-bottom: 5px;
        }
    </style>
</head>

            const entry = document.createElement('div');
            entry.className = `log-entry ${type}`;
            const timestamp = new Date().toLocaleTimeString('en-US', { hour12: false });
            entry.textContent = `[${timestamp}] ${message}`;
            logDisplay.appendChild(entry);
            logDisplay.scrollTop = logDisplay.scrollHeight;
        }

        // Simulate 56k loading
        function simulate56kLoading() {
            return new Promise((resolve) => {
                let progress = 0;
                const duration = 5000; // 5 seconds
                const steps = 100;
                const interval = duration / steps;

                loadingContainer.classList.add('active');
                digButton.disabled = true;
                statusDisplay.textContent = 'EXCAVATING';

                const loadingMessages = [
                    'Establishing connection...',
                    'Handshaking with remote server...',
                    'Downloading artifact data...',
                    'Decoding transmission...',
                    'Reconstructing fragments...',
                    'Verifying integrity...',
                    'Finalizing recovery...'
                ];

                const loadingInterval = setInterval(() => {
                    progress += 1;
                    loadingFill.style.width = progress + '%';
                    
                    const messageIndex = Math.floor((progress / 100) * loadingMessages.length);
                    const message = loadingMessages[Math.min(messageIndex, loadingMessages.length - 1)];
                    loadingText.textContent = `${message} ${progress}%`;

                    // Random connection hiccups
                    if (Math.random() < 0.1) {
                        loadingText.textContent = `Connection interrupted... Retrying... ${progress}%`;
                    }

                    if (progress >= 100) {
                        clearInterval(loadingInterval);
                        loadingText.textContent = 'ARTIFACT RECOVERED! 100%';
                        setTimeout(() => {
                            loadingContainer.classList.remove('active');
                            loadingFill.style.width = '0%';
                            digButton.disabled = false;
                            statusDisplay.textContent = 'READY';
                            resolve();
                        }, 500);
                    }
                }, interval);
            });
        }

                artifactDisplay.innerHTML = '';
            }

            artifactDisplay.insertBefore(artifactElement, artifactDisplay.firstChild);
            artifactCount++;
            artifactCountDisplay.textContent = artifactCount;

            displayArtifact(randomArtifact);

            isDigging = false;
        }

        // Event listeners
        digButton.addEventListener('click', startDigSequence);
