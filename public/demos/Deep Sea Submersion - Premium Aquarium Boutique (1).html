<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Deep Sea Submersion | Premium Aquarium Boutique</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --deep-blue: #0a1a2d;
            --ocean-blue: #1a3a5f;
            --cyan-glow: #00f7ff;
            --emerald-glow: #00ff9d;
            --bioluminescent: rgba(0, 247, 255, 0.3);
            --glass-bg: rgba(255, 255, 255, 0.05);
            --bubble-color: rgba(255, 255, 255, 0.2);
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Quicksand', sans-serif;
            background-color: var(--deep-blue);
            color: #fff;
            overflow-x: hidden;
            min-height: 100vh;
            cursor: none;
        }
        .cursor {
            position: fixed; width: 20px; height: 20px; border-radius: 50%;
            background: rgba(255, 255, 255, 0.1); border: 2px solid var(--cyan-glow);
            pointer-events: none; z-index: 9999; mix-blend-mode: difference; transition: transform 0.1s;
        }
        .underwater-bg {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: -2;
            background: linear-gradient(to bottom, #040d1a 0%, var(--deep-blue) 30%, var(--ocean-blue) 100%);
        }
        .caustic-light {
            position: absolute; width: 300%; height: 300%; top: -100%; left: -100%;
            background: radial-gradient(circle at 30% 30%, rgba(0, 247, 255, 0.03) 0%, transparent 50%);
            animation: causticMove 15s infinite linear; z-index: -1;
        }
        @keyframes causticMove { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        .bubble { position: absolute; border-radius: 50%; background: var(--bubble-color); bottom: -100px; animation: rise linear infinite; }
        @keyframes rise { to { transform: translateY(-100vh); } }
        header {
            position: fixed; top: 0; width: 100%; padding: 1.5rem 3rem; display: flex;
            justify-content: space-between; align-items: center; z-index: 100;
            backdrop-filter: blur(10px); background-color: rgba(10, 26, 45, 0.7);
            border-bottom: 1px solid rgba(0, 247, 255, 0.2);
        }
        .logo { font-size: 1.8rem; font-weight: 700; color: white; text-decoration: none; }
        .hero { height: 100vh; display: flex; flex-direction: column; justify-content: center; align-items: center; text-align: center; }
        .hero h1 {
            font-size: 4.5rem; background: linear-gradient(to right, var(--cyan-glow), var(--emerald-glow));
            -webkit-background-clip: text; color: transparent; filter: url(#water-distortion);
        }
        .products-grid {
            display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
            gap: 2.5rem; padding: 5rem 3rem; max-width: 1400px; margin: 0 auto;
        }
        .product-card {
            background: var(--glass-bg); border-radius: 20px; padding: 2rem; backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.1); transition: all 0.5s ease;
        }
        .product-card:hover { transform: translateY(-10px); box-shadow: 0 15px 40px rgba(0, 247, 255, 0.4); }
        .add-to-cart {
            width: 100%; padding: 0.8rem; background: linear-gradient(90deg, var(--cyan-glow), var(--emerald-glow));
            border: none; border-radius: 10px; color: var(--deep-blue); font-weight: 700; cursor: pointer;
        }
    </style>
</head>
<body>
    <svg width="0" height="0">
        <filter id="water-distortion">
            <feTurbulence type="fractalNoise" baseFrequency="0.01 0.02" numOctaves="3" result="noise">
                <animate attributeName="baseFrequency" values="0.01 0.02;0.02 0.03;0.01 0.02" dur="10s" repeatCount="indefinite" />
            </feTurbulence>
            <feDisplacementMap in="SourceGraphic" in2="noise" scale="8" />
        </filter>
    </svg>
    <div class="cursor"></div>
    <div class="underwater-bg"><div class="caustic-light"></div></div>
    <header><a href="#" class="logo"><i class="fas fa-fish"></i> Deep Sea</a></header>
    <section class="hero">
        <h1>Immerse in Aquatic Elegance</h1>
        <p style="font-size: 1.5rem; max-width: 700px; margin: 2rem 0;">Exquisite marine specimens for the discerning aquarist.</p>
    </section>
    <div class="products-grid">
        <div class="product-card">
            <h3>Royal Blue Tang</h3>
            <div style="font-size: 1.5rem; color: var(--emerald-glow); margin: 1rem 0;">$249.99</div>
            <button class="add-to-cart">Add to Tank</button>
        </div>
    </div>
    <script>
        function createBubbles() {
            const bg = document.querySelector('.underwater-bg');
            for (let i = 0; i < 50; i++) {
                const b = document.createElement('div');
                b.className = 'bubble';
                const size = Math.random() * 25 + 5;
                b.style.width = b.style.height = `${size}px`;
                b.style.left = `${Math.random() * 100}vw`;
                b.style.animationDuration = `${Math.random() * 10 + 10}s`;
                bg.appendChild(b);
            }
        }
        createBubbles();
        const cursor = document.querySelector('.cursor');
        document.addEventListener('mousemove', (e) => {
            cursor.style.left = `${e.clientX - 10}px`;
            cursor.style.top = `${e.clientY - 10}px`;
        });
    </script>
<script src="../template-injector.js"></script>
</body>
</html>
