<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LUMIÃˆRE | Premium Design Store</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        /* --- VARIABLES & RESET --- */
        :root {
            --bg-body: #f3f4f6;
            --primary: #2563eb;
            --primary-dark: #1e40af;
            --text-dark: #111827;
            --text-light: #6b7280;
            --white: #ffffff;
            --card-bg: rgba(255, 255, 255, 0.85);
            --glass-border: rgba(255, 255, 255, 0.5);
            --shadow: 0 10px 40px -10px rgba(0,0,0,0.08);
            --radius-lg: 24px;
            --radius-md: 16px;
            --transition: all 0.4s cubic-bezier(0.16, 1, 0.3, 1);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif; }
        
        body {
            background-color: var(--bg-body);
            background-image: 
                radial-gradient(at 0% 0%, rgba(37, 99, 235, 0.1) 0px, transparent 50%),
                radial-gradient(at 100% 0%, rgba(236, 72, 153, 0.05) 0px, transparent 50%);
            color: var(--text-dark);
            overflow-x: hidden;
        }

        a { text-decoration: none; color: inherit; }
        ul { list-style: none; }
        button { border: none; background: none; cursor: pointer; font-family: inherit; }

        /* --- ANIMATIONS --- */
        @keyframes fadeUp {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        .animate-up { opacity: 0; animation: fadeUp 0.8s forwards; }
        .delay-1 { animation-delay: 0.1s; }
        .delay-2 { animation-delay: 0.2s; }
        .delay-3 { animation-delay: 0.3s; }

        /* --- NAVIGATION --- */
        nav {
            position: fixed;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            width: 90%;
            max-width: 1200px;
            background: rgba(255, 255, 255, 0.8);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            padding: 1rem 2rem;
            border-radius: 100px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            z-index: 1000;
            border: 1px solid var(--glass-border);
            box-shadow: 0 4px 30px rgba(0, 0, 0, 0.03);
        }

        .logo { font-size: 1.5rem; font-weight: 800; letter-spacing: -1px; display: flex; align-items: center; gap: 10px; }
        .logo i { color: var(--primary); }

        .nav-links { display: flex; gap: 2rem; }
        .nav-links a { font-weight: 500; color: var(--text-light); transition: var(--transition); position: relative; }
        .nav-links a:hover { color: var(--text-dark); }
        .nav-links a::after {
            content: ''; position: absolute; width: 0; height: 2px; bottom: -4px; left: 0;
            background: var(--primary); transition: var(--transition);
        }
        .nav-links a:hover::after { width: 100%; }

        .nav-icons { display: flex; gap: 1.2rem; align-items: center; }
        .icon-btn { position: relative; font-size: 1.1rem; transition: var(--transition); }
        .icon-btn:hover { color: var(--primary); transform: translateY(-2px); }
        .badge {
            position: absolute; top: -5px; right: -8px; background: var(--primary);
            color: white; font-size: 0.6rem; width: 16px; height: 16px;
            border-radius: 50%; display: flex; align-items: center; justify-content: center;
        }

        /* --- HERO SECTION --- */
        header {
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 0 2rem;
            position: relative;
        }

        .hero-content {
            text-align: center;
            max-width: 800px;
            z-index: 2;
        }

        .tag {
            display: inline-block;
            padding: 0.5rem 1rem;
            background: rgba(37, 99, 235, 0.1);
            color: var(--primary);
            border-radius: 50px;
            font-size: 0.9rem;
            font-weight: 600;
            margin-bottom: 1.5rem;
        }

        h1 {
            font-size: clamp(3rem, 6vw, 5rem);
            line-height: 1.1;
            margin-bottom: 1.5rem;
            letter-spacing: -2px;
            background: linear-gradient(to right, #111827, #4b5563);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        p.subtitle {
            font-size: 1.2rem;
            color: var(--text-light);
            margin-bottom: 2.5rem;
            line-height: 1.6;
        }

        .cta-group { display: flex; gap: 1rem; justify-content: center; }

        .btn {
            padding: 1rem 2rem;
            border-radius: 50px;
            font-weight: 600;
            transition: var(--transition);
            font-size: 1rem;
        }

        .btn-primary {
            background: var(--text-dark);
            color: white;
            box-shadow: 0 10px 20px rgba(0,0,0,0.1);
        }

        .btn-primary:hover {
            transform: translateY(-3px) scale(1.02);
            background: var(--primary);
            box-shadow: 0 15px 30px rgba(37, 99, 235, 0.3);
        }

        .btn-secondary {
            background: white;
            color: var(--text-dark);
            border: 1px solid #e5e7eb;
        }

        .btn-secondary:hover { border-color: var(--text-dark); }

        /* --- CATEGORY TABS --- */
        .categories-section {
            padding: 2rem 5%;
            margin-top: -50px;
            position: relative;
            z-index: 5;
        }

        .tabs-container {
            display: flex;
            justify-content: center;
            gap: 1rem;
            flex-wrap: wrap;
            margin-bottom: 3rem;
        }

        .tab-btn {
            padding: 0.8rem 1.5rem;
            background: white;
            border-radius: 50px;
            font-weight: 500;
            color: var(--text-light);
            transition: var(--transition);
            border: 1px solid transparent;
            box-shadow: 0 4px 10px rgba(0,0,0,0.03);
        }

        .tab-btn:hover { transform: translateY(-2px); color: var(--primary); }
        
        .tab-btn.active {
            background: var(--text-dark);
            color: white;
            box-shadow: 0 10px 20px rgba(0,0,0,0.15);
        }

        /* --- PRODUCT GRID --- */
        .grid-container {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 2rem;
            max-width: 1400px;
            margin: 0 auto;
            padding-bottom: 5rem;
        }

        .product-card {
            background: var(--card-bg);
            border-radius: var(--radius-lg);
            padding: 1rem;
            transition: var(--transition);
            border: 1px solid rgba(255,255,255,0.6);
            position: relative;
            overflow: hidden;
            opacity: 0; /* For JS animation */
            transform: translateY(20px);
        }

        .product-card.visible {
            opacity: 1;
            transform: translateY(0);
        }

        .product-card:hover {
            transform: translateY(-10px);
            box-shadow: var(--shadow);
            background: white;
        }

        .img-wrapper {
            height: 250px;
            border-radius: var(--radius-md);
            background: #f1f5f9;
            margin-bottom: 1rem;
            position: relative;
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
        }
    </style>
</head>
<body>
    <!-- Content of lumiere design store... -->
<script src="../template-injector.js"></script>
</body>
</html>
