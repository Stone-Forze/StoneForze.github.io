<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CRUNCH KINGS | Fried Chicken</title>
    <link href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Nunito:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #ff4757; /* Ketchup Red */
            --secondary: #ffa502; /* Cheese/Fry Yellow */
            --dark: #2f3542;
            --light: #f1f2f6;
            --white: #ffffff;
            --shadow: 0 10px 20px rgba(0,0,0,0.1);
            --radius: 20px;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Nunito', sans-serif;
        }

        body {
            background-color: var(--light);
            color: var(--dark);
            padding-bottom: 80px; /* Space for sticky cart */
        }

        /* --- HEADER --- */
        header {
            background: var(--white);
            padding: 15px 5%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            position: sticky;
            top: 0;
            z-index: 100;
            box-shadow: 0 5px 15px rgba(0,0,0,0.05);
        }

        .logo {
            font-family: 'Fredoka One', cursive;
            font-size: 1.8rem;
            color: var(--primary);
            text-transform: uppercase;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .logo i { font-size: 2rem; }

        /* --- HERO BANNER --- */
        .hero {
            background: linear-gradient(135deg, var(--primary), #ff6b81);
            color: white;
            padding: 60px 20px;
            text-align: center;
            border-bottom-left-radius: 50px;
            border-bottom-right-radius: 50px;
            margin-bottom: 40px;
            position: relative;
            overflow: hidden;
        }

        .hero h1 {
            font-family: 'Fredoka One', cursive;
            font-size: 3.5rem;
            margin-bottom: 10px;
            text-shadow: 3px 3px 0px rgba(0,0,0,0.1);
        }

        .hero p {
            font-size: 1.2rem;
            font-weight: 700;
            opacity: 0.9;
        }

        /* Floating decoration elements */
        .floating-drumstick {
            position: absolute;
            font-size: 5rem;
            opacity: 0.2;
            animation: float 6s infinite ease-in-out;
        }
        .d1 { top: 10%; left: 10%; animation-delay: 0s; }
        .d2 { bottom: 20%; right: 10%; animation-delay: 2s; transform: rotate(45deg); }

        @keyframes float {
            0%, 100% { transform: translateY(0) rotate(0deg); }
            50% { transform: translateY(-20px) rotate(10deg); }
        }

        /* --- MENU SECTION --- */
        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 0 20px;
        }

        .filters {
            display: flex;
            justify-content: center;
            gap: 15px;
            margin-bottom: 30px;
            flex-wrap: wrap;
        }

        .filter-btn {
            background: var(--white);
            border: 2px solid transparent;
            padding: 10px 25px;
            border-radius: 50px;
            font-weight: 800;
            cursor: pointer;
            transition: 0.3s;
            box-shadow: var(--shadow);
            font-size: 1rem;
        }

        .filter-btn:hover, .filter-btn.active {
            background: var(--secondary);
            color: var(--dark);
            transform: translateY(-2px);
        }

        .menu-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 30px;
        }

        .card {
            background: var(--white);
            border-radius: var(--radius);
            overflow: hidden;
            box-shadow: var(--shadow);
            transition: 0.3s;
            position: relative;
        }

        .card:hover {
            transform: translateY(-10px);
        }

        .card-img-box {
            height: 200px;
            background: #ffeaa7;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
        }

        .card-img {
            width: 80%;
            filter: drop-shadow(0 10px 15px rgba(0,0,0,0.2));
            transition: 0.3s;
        }

        .card:hover .card-img {
            transform: scale(1.1) rotate(5deg);
        }

        .spicy-badge {
            position: absolute;
            top: 15px;
            right: 15px;
            background: #d63031;
            color: white;
            padding: 5px 12px;
            border-radius: 20px;
            font-size: 0.8rem;
            font-weight: 900;
            box-shadow: 0 5px 10px rgba(214, 48, 49, 0.4);
        }

        .card-info {
            padding: 20px;
        }

        .card-title {
            font-weight: 900;
            font-size: 1.2rem;
            margin-bottom: 5px;
        }

        .card-desc {
            font-size: 0.9rem;
            color: #747d8c;
            margin-bottom: 15px;
            height: 40px; /* Keep uniform height */
        }

        .card-footer {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .price {
            font-size: 1.4rem;
            font-weight: 900;
            color: var(--primary);
        }

        .add-btn {
            background: var(--dark);
            color: white;
            border: none;
            width: 40px;
            height: 40px;
            border-radius: 50%;
            font-size: 1.2rem;
            cursor: pointer;
            transition: 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .add-btn:hover {
            background: var(--primary);
            transform: rotate(90deg);
        }

        /* --- STICKY CART BAR --- */
        .cart-bar {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            width: 90%;
            max-width: 600px;
            background: var(--dark);
            color: white;
            padding: 15px 30px;
            border-radius: 50px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-shadow: 0 15px 30px rgba(0,0,0,0.3);
            z-index: 1000;
            cursor: pointer;
            transition: 0.3s;
        }
        
        /* Hidden state for cart when empty */
        .cart-bar.hidden {
            transform: translate(-50%, 150%);
        }

        .cart-info span {
            font-weight: 900;
            color: var(--secondary);
            margin-left: 10px;
        }

        .checkout-btn {
            background: var(--secondary);
            color: var(--dark);
            border: none;
            padding: 10px 20px;
            border-radius: 30px;
            font-weight: 900;
            cursor: pointer;
        }

        /* --- ANIMATIONS --- */
        @keyframes pop {
            0% { transform: scale(1); }
            50% { transform: scale(1.2); }
            100% { transform: scale(1); }
        }

        .pop-anim { animation: pop 0.3s ease; }

        /* Responsive */
        @media (max-width: 600px) {
            .hero h1 { font-size: 2.5rem; }
            .filters { gap: 10px; }
            .filter-btn { padding: 8px 15px; font-size: 0.9rem; }
        }
    </style>
</head>
<body>

    <header>
        <div class="logo">ðŸ— Crunch Kings</div>
        <div style="font-weight: 900;">Open: 10am - 11pm</div>
    </header>

    <div class="hero">
        <div class="floating-drumstick d1">ðŸ—</div>
        <div class="floating-drumstick d2">ðŸŸ</div>
        <h1>IT'S CRUNCH TIME</h1>
        <p>Fresh, crispy, and spicy. Delivered hot to your door.</p>
    </div>

    <div class="container">
        <div class="filters">
            <button class="filter-btn active" onclick="filterMenu('all')">All</button>
            <button class="filter-btn" onclick="filterMenu('buckets')">Buckets</button>
            <button class="filter-btn" onclick="filterMenu('burgers')">Burgers</button>
            <button class="filter-btn" onclick="filterMenu('sides')">Sides</button>
        </div>

        <div class="menu-grid" id="menuGrid">
            </div>
    </div>

    <div class="cart-bar hidden" id="cartBar">
        <div class="cart-info">
            <span id="cartCount">0</span> Items | Total: <span id="cartTotal">$0.00</span>
        </div>
        <button class="checkout-btn" onclick="alert('Order sent to kitchen!')">Checkout âž”</button>
    </div>

    <script>
        // --- DATA ---
        // Using Emojis as images for a fast, lightweight, and universally visible solution
        // In a real site, replace "img" string with actual URL paths.
        const menuItems = [
            {
                id: 1,
                category: 'buckets',
                name: 'Family Feast Bucket',
                desc: '12 pcs Original Recipe chicken + 4 fries.',
                price: 24.99,
                spicy: false,
                img: 'ðŸ—' 
            },
            {
                id: 2,
                category: 'burgers',
                name: 'The Zinger Tower',
                desc: 'Spicy fillet, hashbrown, cheese & salsa.',
                price: 8.99,
                spicy: true,
                img: 'ðŸ”'
            },
            {
                id: 3,
                category: 'buckets',
                name: 'Wicked Wings (10pc)',
                desc: 'Crispy wings tossed in our secret spicy sauce.',
                price: 12.50,
                spicy: true,
                img: 'ðŸ”¥'
            },
            {
                id: 4,
                category: 'sides',
                name: 'Loaded Cheesy Fries',
                desc: 'Large fries topped with liquid gold cheese.',
                price: 5.99,
                spicy: false,
                img: 'ðŸŸ'
            },
            {
                id: 5,
                category: 'burgers',
                name: 'Classic Clucker',
                desc: 'Mayo, lettuce, and a golden fried breast.',
                price: 6.99,
                spicy: false,
                img: 'ðŸ¥ª'
            },
            {
                id: 6,
                category: 'sides',
                name: 'Corn on Cob',
                desc: 'Buttered and grilled to perfection.',
                price: 3.50,
                spicy: false,
                img: 'ðŸŒ½'
            }
        ];

        // --- RENDER MENU ---
        const menuGrid = document.getElementById('menuGrid');

        function renderMenu(filter = 'all') {
            menuGrid.innerHTML = '';
            
            const filtered = menuItems.filter(item => filter === 'all' || item.category === filter);

            filtered.forEach(item => {
                const card = document.createElement('div');
                card.className = 'card';
                card.innerHTML = `
                    <div class="card-img-box">
                        ${item.spicy ? '<span class="spicy-badge">ðŸŒ¶ï¸ SPICY</span>' : ''}
                        <div class="card-img" style="font-size: 80px; text-align:center;">${item.img}</div>
                    </div>
                    <div class="card-info">
                        <div class="card-title">${item.name}</div>
                        <div class="card-desc">${item.desc}</div>
                        <div class="card-footer">
                            <div class="price">$${item.price}</div>
                            <button class="add-btn" onclick="addToCart(${item.price})">+</button>
                        </div>
                    </div>
                `;
                menuGrid.appendChild(card);
            });
        }

        // --- CART LOGIC ---
        let count = 0;
        let total = 0;
        const cartBar = document.getElementById('cartBar');
        const countSpan = document.getElementById('cartCount');
        const totalSpan = document.getElementById('cartTotal');

        function addToCart(price) {
            count++;
            total += price;

            // Update DOM
            countSpan.innerText = count;
            totalSpan.innerText = '$' + total.toFixed(2);

            // Show Cart Bar if hidden
            if(count > 0) {
                cartBar.classList.remove('hidden');
            }

            // Pop Animation on the Cart Bar
            cartBar.classList.add('pop-anim');
            setTimeout(() => cartBar.classList.remove('pop-anim'), 300);
        }

        // --- FILTER LOGIC ---
        const buttons = document.querySelectorAll('.filter-btn');
        function filterMenu(category) {
            // Update active button styling
            buttons.forEach(btn => btn.classList.remove('active'));
            event.target.classList.add('active');
            
            // Re-render items
            renderMenu(category);
        }

        // Initial Load
        renderMenu();

    </script>
<script src="../template-injector.js"></script>
</body>
</html>
