<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Stone Forze - Template Preview</title>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-primary: #ffffff;
            --bg-card: #f8fafc;
            --text-primary: #0f172a;
            --text-secondary: #334155;
            --border: #e2e8f0;
            --accent: #ef4444;
            --accent-hover: #dc2626;
            --font-display: 'Space Grotesk', sans-serif;
            --font-body: 'Plus Jakarta Sans', sans-serif;
        }
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            font-family: var(--font-body);
        }
        .preview-header {
            height: 50px;
            background: #0f172a;
            color: white;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 1.5rem;
            box-sizing: border-box;
            box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1);
            position: relative;
            z-index: 9999;
        }
        .preview-header-left {
            display: flex;
            align-items: center;
            gap: 1.5rem;
        }
        .btn-back {
            color: #cbd5e1;
            text-decoration: none;
            display: flex;
            align-items: center;
            gap: 0.5rem;
            font-size: 0.95rem;
            transition: color 0.2s;
            font-weight: 500;
        }
        .btn-back:hover {
            color: white;
        }
        .preview-title {
            font-family: var(--font-display);
            font-weight: 600;
            font-size: 1rem;
            border-left: 1px solid #334155;
            padding-left: 1.5rem;
            color: #f1f5f9;
        }
        .btn-start-project {
            background: var(--accent);
            color: white;
            border: none;
            padding: 0.5rem 1.25rem;
            border-radius: 4px;
            font-family: var(--font-display);
            font-weight: 600;
            font-size: 0.95rem;
            cursor: pointer;
            transition: background 0.2s;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }
        .btn-start-project:hover {
            background: var(--accent-hover);
        }
        iframe {
            width: 100%;
            height: calc(100vh - 50px);
            border: none;
            display: block;
            margin: 0;
            padding: 0;
            background: #ffffff;
        }
        

      #ai-chat-container {
        position: fixed;
        bottom: 2rem;
        right: 2rem;
        z-index: 1000;
        font-family: var(--font-body);
      }

      #ai-chat-trigger {
        width: 56px;
        height: 56px;
        border-radius: 50%;
        background-color: var(--accent);
        color: #ffffff;
        border: none;
        cursor: pointer;
        box-shadow: 0 4px 15px rgba(153, 25, 48, 0.4);
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 1.5rem;
        position: relative;
        transition: transform 0.3s ease, background-color 0.2s ease;
      }

      #ai-chat-trigger:hover {
        transform: scale(1.08);
        background-color: var(--accent-hover);
      }

      .chat-pulse {
        position: absolute;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        border-radius: 50%;
        border: 2px solid var(--accent);
        animation: chatPulse 2s infinite;
        opacity: 0;
        pointer-events: none;
      }

      @keyframes chatPulse {
        0% { transform: scale(1); opacity: 0.8; }
        100% { transform: scale(1.4); opacity: 0; }
      }

      #ai-chat-window {
        position: absolute;
        bottom: 70px;
        right: 0;
        width: 350px;
        height: 480px;
        border-radius: 12px;
        border: 1px solid var(--border);
        box-shadow: 0 8px 30px rgba(0, 0, 0, 0.25);
        display: flex;
        flex-direction: column;
        overflow: hidden;
        transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        transform-origin: bottom right;
      }

      :root:not([data-theme="light"]) #ai-chat-window {
        background-color: rgba(30, 33, 36, 0.9);
        backdrop-filter: blur(12px);
        -webkit-backdrop-filter: blur(12px);
      }

      [data-theme="light"] #ai-chat-window {
        background-color: rgba(255, 245, 247, 0.95);
        backdrop-filter: blur(12px);
        -webkit-backdrop-filter: blur(12px);
      }

      #ai-chat-window.chat-hidden {
        opacity: 0;
        visibility: hidden;
        transform: scale(0.8) translateY(20px);
        pointer-events: none;
      }

      .chat-header {
        padding: 1rem;
        background-color: var(--bg-card);
        border-bottom: 1px solid var(--border);
        display: flex;
        justify-content: space-between;
        align-items: center;
      }

      .chat-header-info {
        display: flex;
        align-items: center;
        gap: 0.75rem;
      }

      .chat-avatar {
        width: 36px;
        height: 36px;
        border-radius: 50%;
        background-color: var(--accent-muted);
        border: 1px solid var(--accent-border);
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 1.1rem;
        color: var(--accent);
      }

      .chat-title {
        font-family: var(--font-display);
        font-weight: 700;
        font-size: 0.95rem;
        margin: 0;
        color: var(--text-primary);
      }

      .chat-status {
        font-size: 0.75rem;
        color: var(--text-muted);
        display: flex;
        align-items: center;
        gap: 0.25rem;
      }

      .status-dot {
        width: 6px;
        height: 6px;
        border-radius: 50%;
        background-color: var(--success);
        display: inline-block;
      }

      #ai-chat-close {
        background: none;
        border: none;
        color: var(--text-muted);
        font-size: 1.5rem;
        cursor: pointer;
        line-height: 1;
        transition: color 0.2s;
      }

      #ai-chat-close:hover { color: var(--text-primary); }

      .chat-messages {
        flex-grow: 1;
        padding: 1rem;
        overflow-y: auto;
        display: flex;
        flex-direction: column;
        gap: 0.75rem;
      }

      .chat-message {
        padding: 0.6rem 0.9rem;
        border-radius: 8px;
        font-size: 0.85rem;
        max-width: 85%;
        line-height: 1.4;
        word-wrap: break-word;
      }

      .chat-message.bot {
        background-color: var(--bg-card);
        color: var(--text-primary);
        align-self: flex-start;
        border-bottom-left-radius: 2px;
        border: 1px solid var(--border);
      }

      .chat-message.user {
        background-color: var(--accent);
        color: #ffffff;
        align-self: flex-end;
        border-bottom-right-radius: 2px;
      }

      .chat-message.loading {
        display: flex;
        align-items: center;
        gap: 0.2rem;
        padding: 0.6rem 0.9rem;
        align-self: flex-start;
      }

      .chat-message.loading span {
        width: 6px; height: 6px;
        border-radius: 50%;
        background-color: var(--text-muted);
        display: inline-block;
        animation: dotFlashing 1s infinite alternate;
      }

      .chat-message.loading span:nth-child(2) { animation-delay: 0.2s; }
      .chat-message.loading span:nth-child(3) { animation-delay: 0.4s; }

      @keyframes dotFlashing {
        0% { opacity: 0.2; }
        100% { opacity: 1; }
      }

      .chat-chips {
        padding: 0.5rem 1rem;
        display: flex;
        gap: 0.5rem;
        overflow-x: auto;
        scrollbar-width: none;
        border-top: 1px solid var(--border);
        background-color: rgba(0, 0, 0, 0.02);
        flex-shrink: 0;
      }

      .chat-chips::-webkit-scrollbar { display: none; }

      .chat-chip {
        flex-shrink: 0;
        background-color: var(--bg-card);
        border: 1px solid var(--border);
        color: var(--text-secondary);
        padding: 0.3rem 0.8rem;
        border-radius: 50px;
        font-size: 0.75rem;
        cursor: pointer;
        transition: all 0.2s;
        font-family: var(--font-body);
      }

      .chat-chip:hover {
        border-color: var(--accent-border);
        color: var(--accent);
        background-color: var(--accent-muted);
      }

      .chat-input-area {
        padding: 0.75rem 1rem;
        border-top: 1px solid var(--border);
        display: flex;
        gap: 0.5rem;
        background-color: var(--bg-card);
      }

      #ai-chat-input {
        flex-grow: 1;
        background-color: var(--bg-primary);
        border: 1px solid var(--border);
        color: var(--text-primary);
        border-radius: 4px;
        padding: 0.5rem 0.75rem;
        font-size: 0.85rem;
        font-family: var(--font-body);
        transition: border-color 0.2s;
      }

      #ai-chat-input:focus { outline: none; border-color: var(--accent); }

      #ai-chat-send {
        background-color: var(--accent);
        color: #ffffff;
        border: none;
        width: 36px;
        height: 36px;
        border-radius: 4px;
        display: flex;
        align-items: center;
        justify-content: center;
        cursor: pointer;
        transition: background-color 0.2s;
        flex-shrink: 0;
      }

      #ai-chat-send:hover { background-color: var(--accent-hover); }

      @media (max-width: 400px) {
        #ai-chat-window { width: calc(100vw - 2rem); height: 400px; }
      }

      .chat-redirect-row {
        padding: 0.5rem 1rem;
        display: flex;
        gap: 0.5rem;
        border-top: 1px solid var(--border);
        background-color: var(--bg-card);
        justify-content: space-around;
        flex-shrink: 0;
      }

      .chat-redirect-btn {
        flex: 1;
        text-align: center;
        padding: 0.4rem 0.5rem;
        border-radius: 4px;
        font-size: 0.75rem;
        font-weight: 500;
        font-family: var(--font-body);
        color: #ffffff !important;
        transition: transform 0.2s ease, opacity 0.2s ease;
        display: inline-flex;
        align-items: center;
        justify-content: center;
        gap: 0.25rem;
      }

      .chat-redirect-btn:hover {
        transform: translateY(-1px);
        opacity: 0.9;
      }

      .chat-redirect-btn.whatsapp {
        background-color: #25d366;
      }

      .chat-redirect-btn.instagram {
        background: linear-gradient(45deg, #f09433 0%, #e6683c 25%, #dc2743 50%, #cc2366 75%, #bc1888 100%);
      }

      .chat-redirect-btn.email {
        background-color: var(--accent);
      }
    
    </style>
</head>
<body>

    <div class="preview-header">
        <div class="preview-header-left">
            <a href="projects.html" class="btn-back">&larr; Back to Projects</a>
            <div class="preview-title" id="template-title">Template Preview</div>
        </div>
        <button class="btn-start-project" onclick="startProjectWithTemplate()">
            Start Project &#10024;
        </button>
    </div>

    <iframe id="preview-iframe" src="about:blank"></iframe>

<!-- AI Chatbot HTML Markup -->
    <div id="ai-chat-container">
      <button id="ai-chat-trigger" aria-label="Open Chat Assistant">
        <span class="chat-icon">💬</span>
        <span class="chat-pulse"></span>
      </button>

      <div id="ai-chat-window" class="chat-hidden">
        <div class="chat-header">
          <div class="chat-header-info">
            <div class="chat-avatar">⚒</div>
            <div>
              <h4 class="chat-title">Stone Forze Assistant</h4>
              <span class="chat-status"><span class="status-dot"></span> Online</span>
            </div>
          </div>
          <button id="ai-chat-close" aria-label="Close Chat">&times;</button>
        </div>

        <div class="chat-messages" id="ai-chat-messages">
          <div class="chat-message bot">
            Hello! I'm the Stone Forze AI Assistant. Have questions about any of the projects here, or want to hire Arman for something similar? Just ask!
          </div>
        </div>

        <div class="chat-chips">
          <button class="chat-chip" data-query="Tell me about your services & pricing">Services & Pricing 💼</button>
          <button class="chat-chip" data-query="What technologies do you use?">Technologies 💻</button>
          <button class="chat-chip" data-query="How does the hiring process work?">Hiring Process 🤝</button>
          <button class="chat-chip" data-query="Who is Mohammad Arman?">Who is Arman? 👦</button>
        </div>

        <!-- Chat Platform Redirect Row -->
        <div class="chat-redirect-row">
          <a href="https://wa.me/917881120906" target="_blank" rel="noopener noreferrer" class="chat-redirect-btn whatsapp">
            <span>💬</span> WhatsApp
          </a>
          <a href="https://instagram.com/stoneforze" target="_blank" rel="noopener noreferrer" class="chat-redirect-btn instagram">
            <span>📸</span> Instagram
          </a>
          <a href="mailto:usa97090@gmail.com" class="chat-redirect-btn email">
            <span>📧</span> Email
          </a>
        </div>

        <form class="chat-input-area" id="ai-chat-form">
          <input type="text" id="ai-chat-input" placeholder="Type your message..." required autocomplete="off">
          <button type="submit" id="ai-chat-send" aria-label="Send Message">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <line x1="22" y1="2" x2="11" y2="13"></line>
              <polygon points="22 2 15 22 11 13 2 9 22 2"></polygon>
            </svg>
          </button>
        </form>
      </div>
    </div>

    

    <script>
        // Parse URL parameters
        const urlParams = new URLSearchParams(window.location.search);
        const templateSrc = urlParams.get('url');
        let templateTitle = urlParams.get('title');

        if (templateSrc) {
            document.getElementById('preview-iframe').src = templateSrc;
        }
        if (templateTitle) {
            document.getElementById('template-title').textContent = templateTitle;
            document.title = templateTitle + " - Preview";
        }

        // Function to trigger chat with template context
        function startProjectWithTemplate() {
            const title = templateTitle || "this template";
            if (typeof window.startTemplateProject === "function") {
                window.startTemplateProject(title);
            } else {
                // Fallback
                const chatWindow = document.getElementById("ai-chat-window");
                if (chatWindow && chatWindow.classList.contains("chat-hidden")) {
                    chatWindow.classList.remove("chat-hidden");
                    const trigger = document.getElementById("ai-chat-trigger");
                    if(trigger) trigger.style.display = "none";
                }
            }
        }


      document.addEventListener("DOMContentLoaded", () => {
        const chatTrigger = document.getElementById("ai-chat-trigger");
        const chatWindow = document.getElementById("ai-chat-window");
        const chatClose = document.getElementById("ai-chat-close");
        const chatForm = document.getElementById("ai-chat-form");
        const chatInput = document.getElementById("ai-chat-input");
        const chatMessages = document.getElementById("ai-chat-messages");
        const chatChips = document.querySelectorAll(".chat-chip");

        let chatHistory = [];

        window.startTemplateProject = (templateTitle) => {
          chatWindow.classList.remove("chat-hidden");
          chatInput.focus();
          chatMessages.scrollTop = chatMessages.scrollHeight;
          chatInput.value = `Hi Arman, I want to start a project using the ${templateTitle} template.`;
          chatForm.dispatchEvent(new Event('submit', { cancelable: true, bubbles: true }));
        };

        chatTrigger.addEventListener("click", () => {
          chatWindow.classList.toggle("chat-hidden");
          if (!chatWindow.classList.contains("chat-hidden")) {
            chatInput.focus();
            chatMessages.scrollTop = chatMessages.scrollHeight;
          }
        });

        chatClose.addEventListener("click", () => {
          chatWindow.classList.add("chat-hidden");
        });

        chatChips.forEach(chip => {
          chip.addEventListener("click", () => {
            const query = chip.getAttribute("data-query");
            if (query) sendUserMessage(query);
          });
        });

        chatForm.addEventListener("submit", (e) => {
          e.preventDefault();
          const message = chatInput.value.trim();
          if (message) {
            sendUserMessage(message);
            chatInput.value = "";
          }
        });

        function removePreviousSuggestions() {
          const existing = chatMessages.querySelectorAll('.message-suggestions');
          existing.forEach(el => el.remove());
        }

        function appendSuggestions(suggestions) {
          removePreviousSuggestions();
          if (!suggestions || suggestions.length === 0) return;
          
          const suggDiv = document.createElement("div");
          suggDiv.className = "message-suggestions";
          suggDiv.style.display = "flex";
          suggDiv.style.flexWrap = "wrap";
          suggDiv.style.gap = "0.5rem";
          suggDiv.style.marginTop = "0.25rem";
          suggDiv.style.marginBottom = "1rem";
          suggDiv.style.alignSelf = "flex-start";
          suggDiv.style.marginLeft = "1rem";
          
          suggestions.forEach(s => {
            const btn = document.createElement("button");
            btn.className = "chat-chip";
            btn.style.fontSize = "0.75rem";
            btn.style.padding = "0.4rem 0.8rem";
            btn.style.border = "1px solid #ef4444";
            btn.style.borderRadius = "20px";
            btn.style.background = "#ffffff";
            btn.style.color = "#ef4444";
            btn.style.cursor = "pointer";
            btn.style.transition = "all 0.2s ease";
            btn.textContent = s;
            
            btn.addEventListener("mouseover", () => {
              btn.style.background = "#ef4444";
              btn.style.color = "#ffffff";
            });
            btn.addEventListener("mouseout", () => {
              btn.style.background = "#ffffff";
              btn.style.color = "#ef4444";
            });
            
            btn.addEventListener("click", () => {
              removePreviousSuggestions();
              sendUserMessage(s);
            });
            suggDiv.appendChild(btn);
          });
          
          chatMessages.appendChild(suggDiv);
          chatMessages.scrollTop = chatMessages.scrollHeight;
        }

        function appendMessage(sender, content) {
          const msgDiv = document.createElement("div");
          msgDiv.className = `chat-message ${sender}`;
          let formatted = content
            .replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>')
            .replace(/\*(.*?)\*/g, '<em>$1</em>')
            .replace(/\n/g, '<br>');
          msgDiv.innerHTML = formatted;
          chatMessages.appendChild(msgDiv);
          chatMessages.scrollTop = chatMessages.scrollHeight;
        }

        function sendUserMessage(message) {
          removePreviousSuggestions();
          appendMessage("user", message);
          const loadingDiv = document.createElement("div");
          loadingDiv.className = "chat-message bot loading";
          loadingDiv.innerHTML = "<span></span><span></span><span></span>";
          chatMessages.appendChild(loadingDiv);
          chatMessages.scrollTop = chatMessages.scrollHeight;

          fetch("/api/chat", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ message, history: chatHistory })
          })
          .then(res => res.json())
          .then(data => {
            loadingDiv.remove();
            if (data.response) {
              appendMessage("bot", data.response);
              chatHistory.push({ role: "user", content: message });
              chatHistory.push({ role: "assistant", content: data.response });
            } else {
              appendMessage("bot", "Sorry, I received an empty response.");
            }
          })
          .catch(err => {
            console.warn("Backend not available, running in offline simulation mode.", err);
            setTimeout(() => {
              loadingDiv.remove();
              let simResponse = "I'm currently running in offline mode. I can tell you that Mohammad Arman builds high-quality apps and websites! You can contact him via the WhatsApp link or email contact form.";
              let suggestions = ["What is your pricing?", "What technologies do you use?", "View Portfolio"];
              if (message.toLowerCase().includes('price') || message.toLowerCase().includes('cost') || message.toLowerCase().includes('charge') || message.toLowerCase().includes('budget') || message.toLowerCase().includes('package')) {
                simResponse = "Arman offers a wide range of services! Web & Mobile Apps start at ₹1,500 for Landing Pages, up to ₹15,000+ for Custom Web Apps. Design services start at ₹500 for Logos. Tech setups start at ₹1,000, and AI integrations start at ₹2,500. He also offers premium All-in-One Value Packages starting from ₹6,000. Let me know which specific service you are interested in!";
                suggestions = ["I want to hire you", "Do you use React?", "View Portfolio"];
              } else if (message.toLowerCase().includes('skill') || message.toLowerCase().includes('tech') || message.toLowerCase().includes('lang') || message.toLowerCase().includes('framework')) {
                simResponse = "Arman is highly skilled in HTML, CSS, JavaScript, WordPress, and AI Tools. He is also intermediate in Dart, Flutter, Java, Android Studio, and Git. Currently, he is learning React!";
                suggestions = ["What are your prices?", "I want to contact you", "View Portfolio"];
              } else if (message.toLowerCase().includes('contact') || message.toLowerCase().includes('hire') || message.toLowerCase().includes('whatsapp') || message.toLowerCase().includes('freelance')) {
                simResponse = "You can contact Arman directly via email at usa97090@gmail.com or on WhatsApp at +91 78811 20906. He is currently available for freelance projects!";
                suggestions = ["Tell me about your skills", "What are your prices?"];
              } else if (message.toLowerCase().includes('template') || message.toLowerCase().includes('project')) {
                simResponse = "That template is a fantastic choice! Arman can definitely customize it to perfectly fit your brand. Feel free to reach out via WhatsApp or Email below to get started with this specific template!";
                suggestions = ["What is the cost for this?", "I will contact you on WhatsApp"];
              } else if (message.toLowerCase().includes('portfolio') || message.toLowerCase().includes('work') || message.toLowerCase().includes('experience')) {
                simResponse = "Arman has built numerous premium templates, landing pages, and business websites. You are currently viewing his portfolio! You can browse the Projects section to see his live work.";
                suggestions = ["What is your pricing?", "I want to contact you"];
              } else if (message.toLowerCase().includes('hi') || message.toLowerCase().includes('hello') || message.toLowerCase().includes('hey')) {
                simResponse = "Hello there! I'm the AI Assistant for Mohammad Arman. I can help you with questions about his pricing, skills, portfolio, or how to hire him. How can I help you today?";
                suggestions = ["What is your pricing?", "Tell me about your skills"];
              } else if (message.toLowerCase().includes('time') || message.toLowerCase().includes('long') || message.toLowerCase().includes('duration')) {
                simResponse = "Project timelines depend on complexity. Landing pages take 1-3 days, Business Websites take 3-7 days, E-Commerce takes 7-14 days, and Mobile Apps take 14+ days.";
                suggestions = ["What are your prices?", "I want to hire you"];
              } else {
                simResponse = "I'm currently running in an offline simulation, so I might not understand everything perfectly. But I can easily answer questions about Arman's pricing, skills, portfolio, and timelines! What would you like to know?";
                suggestions = ["What is your pricing?", "What technologies do you use?"];
              }
              appendMessage("bot", simResponse);
              appendSuggestions(suggestions);
              chatHistory.push({ role: "user", content: message });
              chatHistory.push({ role: "assistant", content: simResponse });
            }, 800);
          });
        }
      });
    
    </script>
</body>
</html>
